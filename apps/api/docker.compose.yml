services:
  postgres:
    image: postgres:16-alpine
    container_name: keynest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keynest}
      POSTGRES_USER: ${POSTGRES_USER:-keynest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keynest}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - keynest_api

  redis:
    image: redis:7-alpine
    container_name: keynest-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - keynest_api

volumes:
  postgres_data:
  redis_data:

networks:
  keynest_api:
    driver: bridge
